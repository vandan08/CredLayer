version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: credlayer_db
    environment:
      POSTGRES_USER: credlayer
      POSTGRES_PASSWORD: credpassword
      POSTGRES_DB: credlayer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - credlayer_network

volumes:
  postgres_data:

networks:
  credlayer_network:
    driver: bridge
